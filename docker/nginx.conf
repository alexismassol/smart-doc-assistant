# nginx.conf — Configuration Nginx pour Smart Doc Assistant
# Rôle : servir le build React (SPA) + reverse proxy /api → backend FastAPI

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA : toutes les routes → index.html (React Router) ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse proxy /api → backend FastAPI ────────────────────────────────
    # Dans Docker Compose, "backend" est le nom du service (DNS interne)
    location /api {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        # SSE (Server-Sent Events) : désactiver le buffering Nginx
        # Sans ça, les tokens streaming sont bloqués jusqu'à la fin de la réponse
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Assets statiques — cache long terme ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
